<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{TITLE}} — Infographic gallery</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #161c24;
      --text: #e8e0d4;
      --muted: #6b7c8a;
      --accent: #2a9d8f;
      --border: rgba(255,255,255,0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    header {
      padding: 2rem 1.5rem 1rem;
      max-width: 1100px;
      margin: 0 auto;
      border-bottom: 1px solid var(--border);
    }
    header h1 {
      margin: 0 0 0.35rem;
      font-size: 1.75rem;
      letter-spacing: 0.02em;
    }
    header p { margin: 0; color: var(--muted); font-size: 0.95rem; }
    header a { color: var(--accent); }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1rem;
      margin-top: 0.75rem;
      font-size: 0.8rem;
      color: var(--muted);
    }
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1.5rem;
      display: grid;
      gap: 1.5rem;
    }
    figure {
      margin: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    figure img {
      display: block;
      width: 100%;
      height: auto;
      background: #000;
    }
    figcaption {
      padding: 0.85rem 1rem 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1rem;
      align-items: baseline;
      justify-content: space-between;
    }
    figcaption .style {
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 0.75rem;
    }
    figcaption .links { font-size: 0.8rem; }
    figcaption a { color: var(--muted); }
    figcaption a:hover { color: var(--text); }
    footer {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1rem 1.5rem 2.5rem;
      color: var(--muted);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>{{TITLE}}</h1>
    <p>{{SUBTITLE}}</p>
    <div class="meta">
      <span>Model: {{MODEL}}</span>
      <span>Generated: {{DATE}}</span>
      <span><a href="analysis.md">analysis.md</a></span>
      <span><a href="companion.md">companion.md</a></span>
    </div>
  </header>
  <main>
    <!--
      AGENT: for each image, emit:
      <figure>
        <img src="FILENAME" alt="STYLE — TITLE" />
        <figcaption>
          <span class="style">STYLE</span>
          <span class="links">
            <a href="FILENAME" download>image</a> ·
            <a href="PROMPTFILE">prompt</a>
          </span>
        </figcaption>
      </figure>
    -->
    {{FIGURES}}
  </main>
  <footer>
    Generated with the <strong>infographic</strong> skill (Grok Imagine).
    Share this folder or zip it as a self-contained artifact.
  </footer>
</body>
</html>
